# ============================================================
# Docker Compose — Full Agent Stack
#
# Services:
#   1. agent    — FastAPI AI agent (2 replicas)
#   2. redis    — Cache cho session và rate limiting
#   3. qdrant   — Vector database cho RAG
#   4. nginx    — Reverse proxy, load balancer
#
# Chạy: docker compose up
# Test:  curl http://localhost/health
# Stop:  docker compose down
# ============================================================

services:

  # ──────────────────────────────────────
  # Agent Service
  # ──────────────────────────────────────
  agent:
    build:
      context: ../..            # project root để Dockerfile COPY paths đúng
      dockerfile: 02-docker/production/Dockerfile
      target: runtime          # chỉ build stage "runtime", không build "builder"
    environment:
      - ENVIRONMENT=staging
      - PORT=8000
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      # Defaults cho dev/demo; production override qua env_file hoặc docker secret
      - AGENT_API_KEY=${AGENT_API_KEY:-dev-key-change-me}
      - JWT_SECRET=${JWT_SECRET:-dev-jwt-secret}
    env_file:
      - path: .env.local        # secrets riêng, trong .gitignore
        required: false
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    # Không expose port trực tiếp — dùng qua Nginx
    networks:
      - internal

  # ──────────────────────────────────────
  # Redis — Session cache & Rate limiting
  # ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - internal

  # ──────────────────────────────────────
  # Qdrant — Vector database
  # ──────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.0
    volumes:
      - qdrant_data:/qdrant/storage
    # Qdrant image không có curl/wget — dùng service_started trong depends_on thay vì healthcheck
    networks:
      - internal

  # ──────────────────────────────────────
  # Nginx — Reverse proxy & Load balancer
  # ──────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"      # HTTP
      - "443:443"    # HTTPS (cần cert)
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - agent
    restart: unless-stopped
    networks:
      - internal

# ──────────────────────────────────────
# Volumes — persistent data
# ──────────────────────────────────────
volumes:
  redis_data:
  qdrant_data:

# ──────────────────────────────────────
# Network — isolate internal traffic
# ──────────────────────────────────────
networks:
  internal:
    driver: bridge
