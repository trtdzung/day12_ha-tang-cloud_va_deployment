services:
  agent:
    build: .
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=staging
      - APP_NAME=Production AI Agent
      - REDIS_URL=redis://redis:6379/0
      - AGENT_API_KEY=${AGENT_API_KEY:-dev-key-change-me}
      - JWT_SECRET=${JWT_SECRET:-dev-jwt-secret}
      - RATE_LIMIT_PER_MINUTE=${RATE_LIMIT_PER_MINUTE:-20}
      - DAILY_BUDGET_USD=${DAILY_BUDGET_USD:-5.0}
      - EXPOSE_DOCS=${EXPOSE_DOCS:-true}
      - OPENAI_API_KEY=${OPENAI_API_KEY?OPENAI_API_KEY must be set}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - MAX_TOKENS=${MAX_TOKENS:-500}
    env_file:
      - path: .env.local
        required: false
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
